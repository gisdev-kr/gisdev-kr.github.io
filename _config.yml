title: GISdev-kr
tagline: GIS 프로젝트와 개발 기록
description: GIS 개발 기록과 프로젝트를 모으는 사이트입니다.
url: https://gisdev-kr.github.io
baseurl: ""
lang: ko-KR
timezone: Asia/Seoul
author:
  name: gisdev-kr
  url: https://github.com/gisdev-kr
logo: /assets/images/social-card.svg

permalink: /blog/:categories/:year/:month/:day/:title/
paginate_path: /blog/page:num/
markdown: kramdown
kramdown:
  syntax_highlighter: rouge
  input: GFM

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

collections:
  projects:
    output: true
    permalink: /projects/:name/

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
  - scope:
      path: ""
      type: projects
    values:
      layout: page

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - NOTICE.md
  - vendor

# Optional analytics and community integrations. Leave blank until configured.
google_analytics: ""
goatcounter_code: "gisdev-kr"
adsense_client: ""
adsense_enabled: false
giscus:
  enabled: true
  repo: gisdev-kr/gisdev-kr.github.io
  repo_id: "R_kgDOTXOpnw"
  category: Announcements
  category_id: "DIC_kwDOTXOpn84DBHUJ"
  mapping: pathname

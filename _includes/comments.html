{% if site.giscus.enabled and site.giscus.repo_id != "" and site.giscus.category_id != "" %}
<section class="comments" aria-label="댓글">
  <script src="https://giscus.app/client.js"
    data-repo="{{ site.giscus.repo }}" data-repo-id="{{ site.giscus.repo_id }}"
    data-category="{{ site.giscus.category }}" data-category-id="{{ site.giscus.category_id }}"
    data-mapping="{{ site.giscus.mapping }}" data-strict="0" data-reactions-enabled="1"
    data-emit-metadata="0" data-input-position="top" data-theme="preferred_color_scheme"
    data-lang="ko" data-loading="lazy" crossorigin="anonymous" async></script>
</section>
{% endif %}
